# CI: Lake + Mathlib (cache when available). See Lean/VERIFY.md.
name: Lean
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "Lean/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/lean.yml"
  pull_request:
    paths:
      - "Lean/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/lean.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lean 4 proof check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout umst-formal-double-slit (Lake path dep §14bis.h-KRON-1)
        run: |
          set -euo pipefail
          dest="${GITHUB_WORKSPACE}/../umst-formal-double-slit"
          git clone --depth=1 https://github.com/tytolabs/umst-formal-double-slit.git "$dest"
          git -C "$dest" checkout e67b2e9763adb3d4e158f81bccc9d5f581fc2aa2

      - name: Set up Lean 4 + Mathlib cache + build UMST
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: Lean
          auto-config: "false"
          build: "true"
          build-args: "UMST"
          test: "false"
          lint: "false"
          use-mathlib-cache: auto

      - name: No tactic sorry/admit in Lean sources
        run: bash scripts/check_lean_sorry.sh

      - name: Axiom policy (physicalSecondLaw + tier-tagged crypto)
        run: python3 scripts/check_lean_axioms.py

      - name: Lean declaration counts match committed snapshot
        run: python3 scripts/lean_declaration_stats.py --verify-snapshot scripts/expected_lean_declaration_snapshot.json
