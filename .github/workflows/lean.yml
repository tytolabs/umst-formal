# CI: Lake + Mathlib (cache when available). See Lean/VERIFY.md.
name: Lean
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "Lean/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/lean.yml"
  pull_request:
    paths:
      - "Lean/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/lean.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lean 4 proof check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364ed6afde # v4

      - name: Set up Lean 4 + Mathlib cache + build UMST
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          lake-package-directory: Lean
          auto-config: "false"
          build: "true"
          build-args: "UMST"
          test: "false"
          lint: "false"
          use-mathlib-cache: auto

      - name: No tactic sorry/admit in Lean sources
        run: bash scripts/check_lean_sorry.sh

      - name: Single project axiom (physicalSecondLaw only)
        run: python3 scripts/check_lean_axioms.py

      - name: Lean declaration counts match committed snapshot
        run: python3 scripts/lean_declaration_stats.py --verify-snapshot scripts/expected_lean_declaration_snapshot.json

      - name: Cartridge-anchor axiom baseline (Mathlib closure)
        run: bash scripts/check_print_axioms.sh

      - name: Checkout sibling umst-formal-double-slit (shared-module drift)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364ed6afde # v4
        with:
          repository: tytolabs/umst-formal-double-slit
          ref: 1c07e05b5c7bfd6acb1ebe25ae0a7493c91e79d0
          path: sibling/umst-formal-double-slit

      - name: Shared Lean module drift (8 modules)
        env:
          UMST_FORMAL_SIBLING_DIR: ${{ github.workspace }}/sibling/umst-formal-double-slit
        run: bash scripts/check_shared_lean_drift.sh
