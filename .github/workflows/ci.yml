name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The Rust FFI bridge depends on umst-prototype-2a/prototype/src/rust/core
# (a sibling repository).  In CI, set UMST_PROTO_REPO to the full GitHub
# URL of that repository, e.g.:
#   https://github.com/<org>/umst-prototype-2a
# The rust-ffi job clones it at the expected relative path.
env:
  UMST_PROTO_REPO: ${{ vars.UMST_PROTO_REPO || '' }}

jobs:
  # ── Agda type-checking ─────────────────────────────────────────────
  agda:
    name: Agda proof check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Agda + stdlib
        run: |
          sudo apt-get update -q
          sudo apt-get install -y agda agda-stdlib

      - name: Type-check all proofs
        working-directory: Agda
        run: make check

  # ── Coq compilation + extraction ───────────────────────────────────
  coq:
    name: Coq proof compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Coq 8.20
        uses: coq-community/docker-coq-action@v1
        with:
          coq_version: "8.20"
          ocaml_version: "default"

      - name: Compile Coq proofs
        working-directory: Coq
        run: make check

      - name: Run OCaml extraction
        working-directory: Coq
        run: make extract

  # ── Haskell (pure: no FFI flag) ─────────────────────────────────────
  #
  # Builds only the pure modules (UMST, KleisliDIB) and runs QuickCheck.
  # FFI.hs is excluded because it requires libumst_ffi, which is only
  # built in the rust-ffi job.  Use `cabal build -f with-ffi` locally
  # after running `cargo build --release` in ffi-bridge/.
  haskell-pure:
    name: Haskell pure gate tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GHC & cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6"
          cabal-version: "3.10"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-cabal-${{ hashFiles('Haskell/umst-formal.cabal') }}
          restore-keys: ${{ runner.os }}-cabal-

      - name: Update package index
        run: cabal update

      - name: Build pure library (FFI disabled)
        working-directory: Haskell
        # -f -with-ffi: build WITHOUT the FFI flag → no Rust dep, no linker error
        run: cabal build lib:umst-formal -f -with-ffi

      - name: Run QuickCheck property tests
        working-directory: Haskell
        run: |
          cabal test umst-properties \
            -f -with-ffi \
            --test-show-details=streaming \
            --test-option=--qc-max-success=500

      - name: Landauer–Einstein rational sanity (vs Lean tight bracket)
        working-directory: Haskell
        run: cabal test landauer-einstein-sanity

  # ── Rust FFI bridge ────────────────────────────────────────────────
  #
  # Requires umst-prototype-2a at ../../umst-prototype-2a relative to this
  # repo root.  Set the repository-level variable UMST_PROTO_REPO to the
  # GitHub URL of the prototype repo:
  #   Settings → Variables → Actions → New variable: UMST_PROTO_REPO
  rust-ffi:
    name: Rust FFI bridge tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone umst-prototype-2a (required for path dependency)
        if: env.UMST_PROTO_REPO != ''
        run: |
          git clone --depth=1 "$UMST_PROTO_REPO" \
            ../umst-prototype-2a

      - name: Skip if prototype repo not configured
        if: env.UMST_PROTO_REPO == ''
        run: |
          echo "::warning::UMST_PROTO_REPO not set — Rust tests skipped."
          echo "Set the Actions variable UMST_PROTO_REPO to the prototype repo URL."

      - name: Install Rust stable
        if: env.UMST_PROTO_REPO != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        if: env.UMST_PROTO_REPO != ''
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        if: env.UMST_PROTO_REPO != ''
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        if: env.UMST_PROTO_REPO != ''
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run integration tests
        if: env.UMST_PROTO_REPO != ''
        run: cargo test --release -p umst-ffi-bridge

  # ── Visuals script (optional matplotlib; stub OK if deps missing) ─
  visuals:
    name: Generate visuals (fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install visuals dependencies
        run: pip install -r requirements-visuals.txt

      - name: Run generate_visuals.py
        run: python3 scripts/generate_visuals.py

  # ── Lean 4 type-checking ───────────────────────────────────────────
  #
  # Checks all `lakefile.lean` UMST roots with lake build.
  # Uses the Lean version pinned in Lean/lean-toolchain.
  # Mathlib4 is cached by leanprover/lean4-action.
  lean:
    name: Lean 4 proof check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Lean 4 + Mathlib cache
        uses: leanprover/lean4-action@v1
        with:
          build-args: "--wfail"
          working-directory: Lean

      - name: Build all Lean 4 modules
        working-directory: Lean
        run: lake build UMST

      - name: No tactic sorry/admit in Lean sources
        run: bash scripts/check_lean_sorry.sh

      - name: Single project axiom (physicalSecondLaw only)
        run: python3 scripts/check_lean_axioms.py

      - name: Lean declaration counts match committed snapshot
        run: python3 scripts/lean_declaration_stats.py --verify-snapshot scripts/expected_lean_declaration_snapshot.json

  # ── Markdown / docs lint ───────────────────────────────────────────
  docs:
    name: Docs lint + Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: |
          markdownlint \
            README.md \
            CONTRIBUTING.md \
            CHANGELOG.md \
            Agda/README.md \
            Coq/README.md \
            Haskell/README.md \
            Docs/Architecture-Invariants.md \
            --config .markdownlint.json

      - name: Check Markdown links (curated corpus)
        run: bash scripts/check-markdown-links.sh
