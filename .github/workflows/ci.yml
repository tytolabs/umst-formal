name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch/PR to save resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Agda type-checking ─────────────────────────────────────────────
  agda:
    name: Agda proof check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Agda + stdlib
        run: |
          sudo apt-get update -q
          sudo apt-get install -y agda agda-stdlib

      - name: Type-check all proofs
        working-directory: Agda
        run: make check

  # ── Coq compilation ────────────────────────────────────────────────
  coq:
    name: Coq proof compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Coq 8.20
        uses: coq-community/docker-coq-action@v1
        with:
          coq_version: "8.20"
          ocaml_version: "default"

      - name: Compile Coq proofs
        working-directory: Coq
        run: make all

      - name: Run extraction
        working-directory: Coq
        run: make extraction

  # ── Haskell (pure: no FFI) ─────────────────────────────────────────
  haskell-pure:
    name: Haskell pure gate tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GHC & cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6"
          cabal-version: "3.10"

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-cabal-${{ hashFiles('Haskell/umst-formal.cabal') }}
          restore-keys: ${{ runner.os }}-cabal-

      - name: Update package index
        run: cabal update

      - name: Build library (no FFI)
        working-directory: Haskell
        # Build only the pure modules; FFI.hs requires the compiled Rust lib.
        run: |
          cabal build lib:umst-formal \
            --ghc-options="-DPURE_ONLY" \
            2>&1

      - name: Run pure property tests
        working-directory: Haskell
        # Run tests against UMST and KleisliDIB only (no FFI).
        run: |
          cabal test umst-properties \
            --test-option=--qc-max-success=1000 \
            2>&1

  # ── Rust FFI bridge ────────────────────────────────────────────────
  rust-ffi:
    name: Rust FFI bridge tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run FFI bridge tests
        run: cargo test --release -p umst-ffi-bridge

  # ── Markdown / docs lint ───────────────────────────────────────────
  docs:
    name: Docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: |
          markdownlint \
            README.md \
            CONTRIBUTING.md \
            Agda/README.md \
            Coq/README.md \
            Haskell/README.md \
            Docs/Architecture-Invariants.md \
            --config .markdownlint.json \
            || true  # non-fatal until config is tuned
