name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The Rust FFI bridge depends on umst-prototype-2a/prototype/src/rust/core
# (a sibling repository).  In CI, set UMST_PROTO_REPO to the full GitHub
# URL of that repository, e.g.:
#   https://github.com/<org>/umst-prototype-2a
# The rust-ffi job clones it at the expected relative path.
env:
  UMST_PROTO_REPO: ${{ vars.UMST_PROTO_REPO || '' }}

jobs:
  readme-sanity:
    name: README sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: README sanity (catch accidental wipes)
        run: |
          set -euo pipefail
          lines=$(wc -l < README.md)
          if [ "$lines" -lt 20 ]; then
            echo "FAIL: README.md is suspiciously short ($lines lines)"
            exit 1
          fi
          echo "OK: README.md has $lines lines"

  # ── Agda type-checking ─────────────────────────────────────────────
  agda:
    name: Agda proof check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Agda + stdlib
        run: |
          sudo apt-get update -q
          sudo apt-get install -y agda agda-stdlib

      - name: Register Agda libraries (project + standard-library)
        run: |
          mkdir -p ~/.agda/local-libs
          echo "${GITHUB_WORKSPACE}/Agda/umst-formal.agda-lib" >> ~/.agda/libraries
          # System package lives under /usr (read-only); Agda may refresh `.agdai`
          # files, so use a writable copy for CI.
          rm -rf /tmp/agda-stdlib-ci
          cp -a /usr/share/agda-stdlib /tmp/agda-stdlib-ci
          printf '%s\n' 'name: standard-library' 'include: /tmp/agda-stdlib-ci' \
            > ~/.agda/local-libs/standard-library.agda-lib
          echo "${HOME}/.agda/local-libs/standard-library.agda-lib" >> ~/.agda/libraries
          echo "Registered:" && cat ~/.agda/libraries

      - name: Type-check all proofs
        working-directory: Agda
        run: make check

  # ── Coq compilation + extraction ───────────────────────────────────
  coq:
    name: Coq proof compilation
    runs-on: ubuntu-latest
    # Checkout must run on the GitHub runner (job-level `container:` breaks
    # actions/checkout with EACCES on runner file commands).  Run Coq inside
    # the official image via bind mount instead.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compile Coq proofs + extraction (Coq 8.20 in Docker)
        run: |
          set -euo pipefail
          # Image default user `coq` must write through the bind mount; avoid
          # `--user root` (breaks the image opam bootstrap with exit 50).
          chmod -R a+rwX "${GITHUB_WORKSPACE}/Coq"
          # `make check` invokes bare `coqc` per file and drops `-Q . UMSTFormal`
          # from `_CoqProject`; `make extract` runs the full `CoqMakefile` graph first.
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace/Coq \
            coqorg/coq:8.20 \
            bash -euo pipefail -c "make extract"
          uid="$(id -u)"; gid="$(id -g)"
          sudo chown -R "${uid}:${gid}" "${GITHUB_WORKSPACE}/Coq" || chown -R "${uid}:${gid}" "${GITHUB_WORKSPACE}/Coq" || true

  # ── Haskell (pure: no FFI flag) ─────────────────────────────────────
  #
  # Builds only the pure modules (UMST, KleisliDIB) and runs QuickCheck.
  # FFI.hs is excluded because it requires libumst_ffi, which is only
  # built in the rust-ffi job.  Use `cabal build -f with-ffi` locally
  # after running `cargo build --release` in ffi-bridge/.
  haskell-pure:
    name: Haskell pure gate tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install GHC & cabal
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2
        with:
          ghc-version: "9.6"
          cabal-version: "3.10"

      - name: Cache cabal store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-cabal-${{ hashFiles('Haskell/umst-formal.cabal') }}
          restore-keys: ${{ runner.os }}-cabal-

      - name: Update package index
        run: cabal update

      - name: Build pure library (FFI disabled)
        working-directory: Haskell
        # -f -with-ffi: build WITHOUT the FFI flag → no Rust dep, no linker error
        run: cabal build lib:umst-formal -f -with-ffi

      - name: Run QuickCheck property tests
        working-directory: Haskell
        run: |
          cabal test umst-properties \
            -f -with-ffi \
            --test-show-details=streaming \
            --test-option=--qc-max-success=500

      - name: Landauer–Einstein rational sanity (vs Lean tight bracket)
        working-directory: Haskell
        run: cabal test landauer-einstein-sanity

  # ── Rust FFI bridge (ABI 9 agnostic; umst-manifold path dep) ───────
  rust-ffi:
    name: Rust FFI bridge tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: umst-formal

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tytolabs/umst-manifold
          ref: 4b34ce4793bc727229594b007ddb13daa153e3df
          path: umst-manifold

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.88
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            umst-formal/ffi-bridge/target
          key: ${{ runner.os }}-cargo-ffi-${{ hashFiles('umst-formal/ffi-bridge/Cargo.lock') }}

      - name: Check formatting
        working-directory: umst-formal/ffi-bridge
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        working-directory: umst-formal/ffi-bridge
        run: cargo clippy --all-targets -- -D warnings

      - name: Run integration tests
        working-directory: umst-formal/ffi-bridge
        run: cargo test

  # ── Visuals script (optional matplotlib; stub OK if deps missing) ─
  visuals:
    name: Generate visuals (fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install visuals dependencies
        run: pip install -r requirements-visuals.txt

      - name: Run generate_visuals.py
        run: python3 scripts/generate_visuals.py

  # ── Lean 4 type-checking ───────────────────────────────────────────
  #
  # Checks all `lakefile.lean` UMST roots with lake build.
  # Uses the Lean version pinned in Lean/lean-toolchain.
  # Mathlib cache via leanprover/lean-action (lean4-action repo was removed).
  lean:
    name: Lean 4 proof check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Lean 4 + Mathlib cache + build UMST
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          lake-package-directory: Lean
          auto-config: "false"
          build: "true"
          # Omit `--wfail` here: a Mathlib cache miss can force a long replay where
          # upstream doc/linter noise is treated as failure. Project sources stay
          # warning-clean under normal `lake build UMST` in development.
          build-args: "UMST"
          test: "false"
          lint: "false"
          use-mathlib-cache: auto

      - name: No tactic sorry/admit in Lean sources
        run: bash scripts/check_lean_sorry.sh

      - name: Single project axiom (physicalSecondLaw only)
        run: python3 scripts/check_lean_axioms.py

      - name: Lean declaration counts match committed snapshot
        run: python3 scripts/lean_declaration_stats.py --verify-snapshot scripts/expected_lean_declaration_snapshot.json

      - name: Cartridge-anchor axiom baseline (Mathlib closure)
        run: bash scripts/check_print_axioms.sh

      - name: Checkout sibling umst-formal-double-slit (shared-module drift)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tytolabs/umst-formal-double-slit
          ref: d2b91ef4c08e540b79546f2b8a16fb2be606398b
          path: sibling/umst-formal-double-slit

      - name: Shared Lean module drift (8 modules)
        env:
          UMST_FORMAL_SIBLING_DIR: ${{ github.workspace }}/sibling/umst-formal-double-slit
        run: bash scripts/check_shared_lean_drift.sh

  # ── Markdown / docs lint ───────────────────────────────────────────
  docs:
    name: Docs lint + Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: |
          markdownlint \
            README.md \
            CONTRIBUTING.md \
            CHANGELOG.md \
            Agda/README.md \
            Coq/README.md \
            Haskell/README.md \
            Docs/Architecture-Invariants.md \
            --config .markdownlint.json

      - name: Check Markdown links (curated corpus)
        run: bash scripts/check-markdown-links.sh
